<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motherboard Selector | Simple PC Parts Configurator</title>
  <link rel="stylesheet" href="part-pages.css" />
</head>
<body data-page-type="motherboard">
  <main class="page">
    <header class="topbar">
      <h1>Motherboard Selector</h1>
      <a class="back-link" href="index.html">Back to Home</a>
    </header>

    <section class="panel-wrap selector-block">
      <p class="prompt">Choose vendor first. Then click the socket tile to load chipset and compatibility lists.</p>

      <div class="vendor-row" role="tablist" aria-label="Motherboard vendor selector">
        <button class="vendor-btn" type="button" data-vendor="amd">AMD</button>
        <button class="vendor-btn" type="button" data-vendor="intel">Intel</button>
      </div>

      <section class="panel" data-panel="amd" aria-hidden="true">
        <div class="option-grid"></div>
        <div class="parts-output" aria-live="polite"></div>
      </section>

      <section class="panel" data-panel="intel" aria-hidden="true">
        <div class="option-grid"></div>
        <div class="parts-output" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script src="catalog-data.js"></script>
  <script src="part-pages.js"></script>
</body>
</html>
