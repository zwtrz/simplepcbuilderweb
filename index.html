<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple PC Parts Configurator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="landing">
      <article class="intro">
        <h1>Simple PC Parts Configurator</h1>
        <p>
          Pick one part first and the website builds a focused recommendation around it. It prioritizes compatibility, PCIe behavior, and balanced pairings for CPU, GPU, and motherboard choices.
        </p>
      </article>

      <nav class="option-stack" aria-label="Part selector">
        <button class="option-tile" type="button" data-target="cpu.html" style="--delay: 0.08s;">
          <span class="option-name">CPU</span>
          <span class="option-hint">Start from processor generation and platform</span>
        </button>
        <button class="option-tile" type="button" data-target="gpu.html" style="--delay: 0.18s;">
          <span class="option-name">GPU</span>
          <span class="option-hint">Start from graphics architecture and lane needs</span>
        </button>
        <button class="option-tile" type="button" data-target="motherboard.html" style="--delay: 0.28s;">
          <span class="option-name">Motherboard</span>
          <span class="option-hint">Start from chipset and socket compatibility</span>
        </button>
      </nav>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
